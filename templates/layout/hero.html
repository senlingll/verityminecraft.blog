<section id="hero" class="hero-section hero-soft">
    <div class="container">
        <div class="row justify-content-center text-center">
            <div class="col-lg-10">
                <!-- NEW Badge and Title -->
                <div class="mb-4">
                    <span class="badge badge-new-green">{{ page.hero.badge }}</span>
                    <span class="hero-subline">{{ page.hero.subline }}</span>
                </div>

                <!-- Main Title -->
                <h1 class="hero-title mb-4 hero-title-primary">
                    {{ page.hero.title|safe }}
                </h1>

                <!-- Description -->
                <p class="hero-description hero-description-primary">
                    {{ page.hero.description }}
                </p>
            </div>
        </div>
    </div>
</section>
