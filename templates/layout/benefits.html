{% if page.benefits %}
<section class="benefits-section py-5 benefits-gradient">
    <div class="container">
        <div class="row align-items-center">
            <!-- Left side - Content -->
            <div class="col-lg-6">
                <div class="content-wrapper pe-lg-4">
                    <span class="badge bg-light text-dark mb-3 benefits-badge">{{ page.benefits.badge }}</span>
                    <h2 class="benefits-title mb-4">
                        {{ page.benefits.title }}
                    </h2>
                    <p class="benefits-description mb-4">
                        {{ page.benefits.description }}
                    </p>

                    <!-- Accordion for benefits -->
                    <div class="accordion benefit-accordion" id="benefitsAccordion">
                        {% for item in page.benefits.benefit_items %}
                        <div class="accordion-item">
                            <h3 class="accordion-header" id="heading{{ loop.index }}">
                                <button class="accordion-button {% if not loop.first %}collapsed{% endif %}" type="button" data-bs-toggle="collapse" data-bs-target="#collapse{{ loop.index }}" aria-expanded="{{ 'true' if loop.first else 'false' }}" aria-controls="collapse{{ loop.index }}">
                                    <svg class="me-3" width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M10 9V5l-7 7 7 7v-4.1c5 0 8.5 1.6 11 5.1-1-5-4-10-11-11z" fill="currentColor"/></svg> {{ item.title }}
                                </button>
                            </h3>
                            <div id="collapse{{ loop.index }}" class="accordion-collapse collapse {{ 'show' if loop.first else '' }}" aria-labelledby="heading{{ loop.index }}" data-bs-parent="#benefitsAccordion">
                                <div class="accordion-body">
                                    {{ item.description }}
                                </div>
                            </div>
                        </div>
                        {% endfor %}
                    </div>
                </div>
            </div>

            <!-- Right side - Image -->
            <div class="col-lg-6 mt-4 mt-lg-0">
                <div class="image-wrapper benefits-image-wrapper">
                    <img src="{{ page.benefits.image_url }}" alt="{{ page.benefits.title }}" class="img-fluid w-100 benefits-image">
                </div>
            </div>
        </div>
    </div>
</section>
{% endif %}
