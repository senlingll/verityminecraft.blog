<section id="features" class="key-features-section py-5 key-features-bg">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-10">
                <!-- Section Header -->
                <div class="text-center mb-5">
                    <h2 class="section-title mb-3">
                        {{ key_features.title }}
                    </h2>
                    <p class="section-description mx-auto max-w-600">
                        {{ key_features.description }}
                    </p>
                </div>

                <!-- Features Grid -->
                <div class="row g-4">
                    {% for feature in key_features.features %}
                    <div class="col-md-6 col-lg-4">
                        <div class="feature-card h-100">
                            <!-- Feature Icon -->
                            <div class="feature-icon feature-icon-box mb-3">
                                <i class="{{ feature.icon }}"></i>
                            </div>

                            <!-- Feature Title -->
                            <h4 class="feature-title mb-3" style="color: #2c3e50; font-size: 1.3rem; font-weight: 600; line-height: 1.3;">
                                {{ feature.title }}
                            </h4>

                            <!-- Feature Description -->
                            <p class="feature-description" style="color: #5a6c7d; font-size: 0.95rem; line-height: 1.5; margin: 0;">
                                {{ feature.description }}
                            </p>
                        </div>
                    </div>
                    {% endfor %}
                </div>
            </div>
        </div>
    </div>
</section>
